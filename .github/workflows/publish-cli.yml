name: Publish CLI to npm

# Publishes the `worldmonitor` npm package from cli/. Triggered by a
# CLI-specific tag (cli-v1.2.3) so it is independent of desktop app releases,
# or manually via workflow_dispatch (with a dry-run option). Requires an
# `NPM_TOKEN` repository secret (an npm automation token with publish rights).

on:
  push:
    tags: ['cli-v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Pack and validate only — do not publish'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Test
        run: node --test 'test/**/*.test.mjs'

      - name: Verify package version matches the tag
        if: startsWith(github.ref, 'refs/tags/cli-v')
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --dry-run --provenance --access public

      - name: Publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
